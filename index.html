<!DOCTYPE html>
<html lang="ru">
<head>
<meta name="robots" content="noindex, nofollow, noarchive">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Моя зарплата</title>

<!-- ===== ИКОНКИ ===== -->
<link rel="icon" type="image/png" href="iconzp.png">
<link rel="shortcut icon" type="image/png" href="iconzp.png">

<!-- Иконки для iOS -->
<link rel="apple-touch-icon" href="iconzp.png">
<link rel="apple-touch-icon" sizes="120x120" href="iconzp.png">
<link rel="apple-touch-icon" sizes="152x152" href="iconzp.png">
<link rel="apple-touch-icon" sizes="167x167" href="iconzp.png">
<link rel="apple-touch-icon" sizes="180x180" href="iconzp.png">

<!-- PWA-манифест -->
<link rel="manifest" href="manifest.json">

<!-- Мета-теги для iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Зарплата">
<meta name="theme-color" content="#11998e">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,#11998e 0%,#38ef7d 100%);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .loader {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,#11998e 0%,#38ef7d 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.3s ease;
  }
  .loader img {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    margin-bottom: 24px;
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 10px 30px rgba(0,0,0,.3);
  }
  .loader p {
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px;
    opacity: 0.9;
    font-weight: 600;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.95); opacity: 0.8; }
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #11998e;
  }
</style>
</head>
<body>

<div class="loader" id="loader">
  <img src="iconzp.png" alt="Зарплата">
  <p>Загрузка...</p>
</div>

<iframe 
  id="app"
  src="AKfycbyTlTm1mfCrwmOed-a7jcBptUJn2EvpuqEIyclud6tPQLo5UnCTQwTHJQng7MrRxXXq2Q"
  allowfullscreen
  allow="clipboard-read; clipboard-write"
  onload="document.getElementById('loader').style.opacity='0';setTimeout(()=>document.getElementById('loader').style.display='none',300);">
</iframe>

</body>
</html>
